data:
  data_path: "data/1h.csv"
  lookback_window: 512    # ~21 days of context
  predict_window: 48      # 2 days ahead
  max_context: 512
  clip: 5.0               # Standard for financial data
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0

training:
  tokenizer_epochs: 50    # High epochs for maximum reconstruction quality
  batch_size: 64          # 64 easily fits on a 16GB T4 for this model size
  log_interval: 20
  num_workers: 4          # Adjust based on your CPU cores
  seed: 42
  
  # Defaults (will be overridden by HPO)
  tokenizer_learning_rate: 0.0002
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1
  accumulation_steps: 1
  tokenizer_pct_start: 0.05
  tokenizer_div_factor: 10.0
  tokenizer_max_grad_norm: 2.0

model_paths:
  pretrained_tokenizer: "models/nos_tokenizer_2k"
  pretrained_predictor: "models/nos_mini"
  exp_name: "run_1h_t4_optimal"
  base_path: "finetuned"
  tokenizer_save_name: "tokenizer"

experiment:
  name: "Nos_1h_tokenizer_opt"
  use_comet: false
  train_tokenizer: true
  train_basemodel: false  # We are ONLY focusing on the tokenizer right now
  pre_trained: true

# ── Hyperparameter Search Space ──────────────────────────────────
hpo:
  enabled: true                     # MUST BE TRUE to find the best params
  n_trials: 40                      # Increased to 40 for a more thorough search
  direction: "minimize"             
  sampler: "tpe"                    
  pruner: "median"                  
  storage: "sqlite:///finetuned/test_1h/hpo_results.db" # Save progress so you can resume!
  study_name: "nos_tokenizer_t4_hpo"

  optimize_tokenizer: true
  optimize_basemodel: false         # Turn off basemodel HPO for now; focus entirely on the tokenizer

  hpo_tokenizer_epochs: 8           # Bump to 8. 5 is slightly too short for the BSQ loss to stabilize

  search_space:
    # ── Tokenizer ──────────────────────────────────────────────
    tokenizer_learning_rate:
      type: float
      low: 5.0e-5                   # Tightened bounds: 1e-5 is too slow
      high: 8.0e-4                  # Tightened bounds: 5e-3 will likely cause divergence
      log: true

    # ── Shared Optimizer ───────────────────────────────────────
    adam_weight_decay:
      type: float
      low: 0.01                     # Raised minimum to prevent overfitting
      high: 0.2
      log: true

    # ... keep beta1/beta2 the same ...

    # ── Batch & Accumulation ───────────────────────────────────
    batch_size:
      type: categorical
      choices: [32, 64]             # REMOVED 128. 128 will likely OOM your 16GB T4. 

    # ... keep schedulers & gradient clipping the same ...

    # ── Dropout ────────────────────────────────────────────────
    # Tokenizers usually need LESS dropout than predictors because they are just learning 
    # a reconstruction mapping. Force these lower.
    ffn_dropout_p:
      type: float
      low: 0.0
      high: 0.1                     # Lowered from 0.4
      log: false

    # ... keep BSQ weights the same, your bounds there are good ...