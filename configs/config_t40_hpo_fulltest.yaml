data:
  data_path: "data/4h.csv"
  lookback_window: 512      # ~85 days of historical 4H context (power of 2 optimized)
  predict_window: 48        # 8 days of forward prediction (48 * 4 hours)
  max_context: 512
  clip: 5.0
  train_ratio: 0.8
  val_ratio: 0.2
  test_ratio: 0.0

training:
  # Reduced epochs because 1 epoch now processes 6x more data than the 1D dataset
  tokenizer_epochs: 30
  basemodel_epochs: 20
  
  # Drastically reduced base batch_size to survive 16GB VRAM with a 512 context length
  batch_size: 32
  log_interval: 20

  num_workers: 4
  pin_memory: true
  persistent_workers: true
  seed: 42

  tokenizer_learning_rate: 0.0003
  predictor_learning_rate: 0.00005

  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1

  accumulation_steps: 2     # Increased to maintain effective batch size

  tokenizer_pct_start: 0.05
  tokenizer_div_factor: 10.0
  basemodel_pct_start: 0.05
  basemodel_div_factor: 10.0

  tokenizer_max_grad_norm: 2.0   
  basemodel_max_grad_norm: 3.0   

model_paths:
  pretrained_tokenizer: "models/nos_tokenizer_2k"
  pretrained_predictor: "models/nos_mini"
  exp_name: "4h_t4_hpo"
  base_path: "finetuned"
  base_save_path: ""
  finetuned_tokenizer: ""
  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "Nos_4h_T4_HPO"
  description: "T4 16GB Optimized HPO for 4-Hour Market Data"
  use_comet: false
  train_tokenizer: true
  train_basemodel: true
  skip_existing: false

device:
  use_cuda: true
  device_id: 0

# ── Hyperparameter Search Space ──────────────────────────────────
hpo:
  enabled: true                    
  n_trials: 15                      # Slightly higher trials to map the new temporal dynamics
  direction: "minimize"            
  sampler: "tpe"                   
  pruner: "hyperband"

  # Updated DB path to prevent overwriting the 1D study
  storage: "sqlite:///C:/Temp/nos_t40_4h_hpo.db?timeout=60"
  study_name: "nos_finetune_4h_hpo"

  optimize_tokenizer: true
  optimize_basemodel: true

  # 4H dataset is large; 3 epochs is enough for Hyperband to prune bad trajectories
  hpo_tokenizer_epochs: 3
  hpo_basemodel_epochs: 3

  search_space:
    # ── Tokenizer ──────────────────────────────────────────────
    tokenizer_learning_rate:
      type: float
      low: 5.0e-5
      high: 3.0e-3
      log: true

    # ── Predictor ──────────────────────────────────────────────
    predictor_learning_rate:
      type: float
      low: 1.0e-6
      high: 1.0e-4
      log: true

    # ── Shared Optimizer ───────────────────────────────────────
    adam_weight_decay:
      type: float
      low: 0.01
      high: 0.2
      log: true

    # ── Batch & Accumulation ───────────────────────────────────
    batch_size:
      type: categorical
      # Shifted down. 128 or 256 will cause immediate OOM with seq_len=512 on a T4.
      choices: [16, 32, 64]

    accumulation_steps:
      type: categorical
      # Allows HPO to simulate larger batch sizes (e.g., 32 batch * 4 accum = 128 effective)
      choices: [1, 2, 4]

    # ── Scheduler ─────────────────────────────────────────────
    tokenizer_pct_start:
      type: float
      low: 0.05
      high: 0.15
      log: false

    basemodel_pct_start:
      type: float
      low: 0.05
      high: 0.15
      log: false

    tokenizer_div_factor:
      type: categorical
      choices: [10.0, 25.0, 50.0]

    basemodel_div_factor:
      type: categorical
      choices: [10.0, 25.0, 50.0]

    # ── Dropout ────────────────────────────────────────────────
    ffn_dropout_p:
      type: float
      low: 0.05      # Lowered floor: 4H has 6x more data, inherently reducing overfitting
      high: 0.3
      log: false

    resid_dropout_p:
      type: float
      low: 0.05      # Lowered floor
      high: 0.25
      log: false

    # ── BSQ Loss Weights ──────────────────────────────────────
    bsq_beta:
      type: float
      low: 0.01
      high: 0.2
      log: true

    bsq_gamma:
      type: float
      low: 0.8
      high: 2.0
      log: false

    bsq_zeta:
      type: float
      low: 0.01
      high: 0.2
      log: true